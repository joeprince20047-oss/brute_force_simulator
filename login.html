<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Brute Force Simulator Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1b3a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      background: #fef3cd;
      color: #856404;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 1px solid #ffc107;
    }
    h1 { font-size: 22px; color: #2c2c2a; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #6c757d; margin-bottom: 24px; }
    label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      transition: border 0.2s;
      outline: none;
    }
    input:focus { border-color: #534AB7; }
    button {
      width: 100%;
      padding: 11px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3c3489; }
    #message {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .demo-creds {
      margin-top: 20px;
      padding: 10px 12px;
      background: #f0eeff;
      border-radius: 8px;
      font-size: 12px;
      color: #534AB7;
    }
    .demo-creds b { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🔒 Sandbox Environment</div>
    <h1>Sign In</h1>
    <p class="sub">Brute Force Simulator — Local Test Target</p>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password"/>

    <button onclick="doLogin()">Login</button>

    <div id="message"></div>

    <div class="demo-creds">
      <b>Demo Credentials (for testing)</b>
      admin : secret123<br/>
      user  : password1
    </div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('message');

      if (!username || !password) {
        showMessage('Please enter both username and password.', 'warning');
        return;
      }

      const form = new FormData();
      form.append('username', username);
      form.append('password', password);

      try {
        const resp = await fetch('/login', { method: 'POST', body: form });
        const data = await resp.json();

        if (resp.status === 200) {
          showMessage('✓ ' + data.message, 'success');
        } else if (resp.status === 429) {
          showMessage('⚠ ' + data.error, 'warning');
        } else {
          const rem = data.attempts_remaining !== undefined
            ? ` (${data.attempts_remaining} attempts left)`
            : '';
          showMessage('✗ ' + data.error + rem, 'error');
        }
      } catch (e) {
        showMessage('Connection error.', 'error');
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className   = type;
      msg.style.display = 'block';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
